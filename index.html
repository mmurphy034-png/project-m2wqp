<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MLB Win% vs Betting Apps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="shell">
      <section class="hero">
        <article class="hero-copy hero-copy-minimal">
          <h1 id="headline">MLB ⚾</h1>
        </article>
      </section>

      <section class="grid">
        <article class="panel panel-wide">
          <div class="section-header">
            <p class="eyebrow">Snapshot</p>
            <h2>How records compare with moneylines</h2>
          </div>
          <div id="snapshotGrid" class="snapshot-grid"></div>
        </article>

        <article class="panel panel-wide">
          <div class="section-header">
            <p class="eyebrow">Today's Matchups</p>
            <h2>Probable starters and bullpen weight</h2>
          </div>
          <div id="matchupsGrid" class="matchups-grid"></div>
        </article>

        <article class="panel">
          <div class="section-header">
            <p class="eyebrow">Market Higher</p>
            <h2>Teams books like more than their record</h2>
          </div>
          <div id="marketHigherGroup" class="card-list"></div>
        </article>

        <article class="panel">
          <div class="section-header">
            <p class="eyebrow">Market Lower</p>
            <h2>Teams books trust less than their record</h2>
          </div>
          <div id="marketLowerGroup" class="card-list"></div>
        </article>

        <article class="panel panel-wide">
          <div class="section-header">
            <p class="eyebrow">All Games</p>
            <h2>Today's games with team win percentage</h2>
          </div>
          <div id="scoreboard" class="matrix"></div>
        </article>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>

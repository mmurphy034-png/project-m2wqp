<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MLB Win% vs Betting Apps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="shell">
      <section class="hero">
        <article class="hero-copy hero-copy-minimal">
          <h1 id="headline">MLB</h1>
        </article>
      </section>

      <section class="grid">
        <article class="panel panel-wide">
          <div class="section-header">
            <p class="eyebrow">Headlines</p>
            <h2>Latest MLB links</h2>
          </div>
          <div id="headlineLinks" class="headline-links"></div>
        </article>

        <article class="panel panel-wide">
          <div class="section-header">
            <p class="eyebrow">All Games</p>
            <h2>Today's games</h2>
          </div>
          <div id="scoreboard" class="matrix"></div>
        </article>

        <article class="panel panel-wide">
          <div class="section-header">
            <p class="eyebrow">Pitching Matchups</p>
            <h2>Starter form and bullpen context</h2>
          </div>
          <div id="pitchingGrid" class="matchups-grid"></div>
        </article>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
